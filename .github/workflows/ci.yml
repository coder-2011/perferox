name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  hosted:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: Linux / Python 3.11
            os: ubuntu-latest
            python: "3.11"
          - name: Linux / Python 3.13
            os: ubuntu-latest
            python: "3.13"
          - name: macOS / Python 3.13
            os: macos-latest
            python: "3.13"
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true
      - run: uv sync --locked
      - run: uv run python -m unittest tests.py

  local-mac:
    name: Local Mac / Python 3.13
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
      - run: uv sync --locked
      - run: uv run python -m unittest tests.py
